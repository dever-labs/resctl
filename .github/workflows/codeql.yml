name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          # CodeQL manages its own caching; disable the action cache to avoid conflicts.
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: go
          build-mode: manual

      # All source files carry //go:build windows, so auto-build sees nothing on Linux.
      # Cross-compile with GOOS=windows so every tagged file is traced by CodeQL.
      # resource.syso is absent here but the Go compiler does not require it.
      - name: Build (cross-compile for Windows)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:go"
