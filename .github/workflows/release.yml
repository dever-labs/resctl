name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Run tests before building the release artifact
      - name: Run tests
        run: go test -v -race ./...

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Embed version resources
        run: goversioninfo -64 -o resource.syso

      - name: Build release binary
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o resctl.exe .

      - name: Smoke test
        run: .\resctl.exe version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: resctl.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
